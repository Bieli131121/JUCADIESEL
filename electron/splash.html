<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        margin: 0;
        width: 340px;
        height: 340px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        font-family: 'Segoe UI', sans-serif;
        -webkit-app-region: drag;
      }
      .caixa {
        background: #14161a;
        border-radius: 20px;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      }
      img {
        width: 160px;
        object-fit: contain;
      }
      .carregando {
        width: 120px;
        height: 3px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 999px;
        overflow: hidden;
      }
      .barra {
        width: 40%;
        height: 100%;
        background: #f2600c;
        border-radius: 999px;
        animation: mover 1.1s ease-in-out infinite;
      }
      @keyframes mover {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
    </style>
  </head>
  <body>
    <div class="caixa">
      <img src="../public/branding/logo-jucax.png" alt="JUCAX" />
      <div class="carregando"><div class="barra"></div></div>
    </div>
  </body>
</html>
